spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/seguranca-proxy
    username: postgres
    password: aluno
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    url: jdbc:postgresql://localhost:5432/seguranca-proxy
    user: postgres
    password: aluno
    enabled: true
    schemas:
      - public